# SAT Competition 2025 Configuration

# Solver resource limits
solver_cputime: 5000          # CPU time limit for solvers in seconds
solver_walltime: 7000         # Wall time limit for solvers in seconds
solver_memory: 65536          # Memory limit for solvers in MB

# Checker resource limits
checker_cputime: 45000        # CPU time limit for checkers in seconds
checker_walltime: 70000       # Wall time limit for checkers in seconds
checker_memory: 65536         # Memory limit for checkers in MB

# Job scheduler configuration
scheduling:
  scheduler: slurm
  machine: cpuonly                  # machine/partition name for scheduler
  account: hk-project-test-p0026435 # Account name for scheduler
  tasks_per_node: 16                # Number of tasks per node
  jobname: satcomp25                # Job name for scheduler

# Benchmark and solver files
benchmarks: ./satcomp25.instances.csv # Path to CSV containing benchmark hashes
solvers: ./satcomp25.solvers.csv      # Path to CSV containing solver paths
results: ./satcomp25.results          # Path to directory for storing results